<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e4e6f0;
    --text-dim: #8b8fa7;
    --green: #34d399;
    --green-bg: rgba(52,211,153,.12);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251,191,36,.12);
    --red: #f87171;
    --red-bg: rgba(248,113,113,.12);
    --blue: #60a5fa;
    --blue-bg: rgba(96,165,250,.12);
    --purple: #a78bfa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 36px; height: 36px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .subtitle { font-size: 13px; color: var(--text-dim); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge {
    padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
    background: var(--green-bg); color: var(--green);
  }
  .badge.warn { background: var(--yellow-bg); color: var(--yellow); }
  .date-label { font-size: 13px; color: var(--text-dim); }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
  }
  .tab {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; color: var(--text-dim); border: none; background: none;
    white-space: nowrap; transition: all .15s;
  }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--text); background: var(--surface2); }

  /* Main */
  .main { padding: 24px 32px; max-width: 1440px; margin: 0 auto; }

  /* Executive Summary */
  .exec-summary {
    background: linear-gradient(135deg, rgba(96,165,250,.08), rgba(167,139,250,.08));
    border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; margin-bottom: 24px;
    font-size: 14px; line-height: 1.7; color: var(--text-dim);
  }
  .exec-summary strong { color: var(--text); }

  /* Section */
  .section { margin-bottom: 32px; }
  .section-title {
    font-size: 14px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: var(--text-dim); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--blue);
  }

  /* Grid */
  .grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }

  /* Card */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    cursor: pointer; transition: all .15s; position: relative;
  }
  .card:hover { border-color: #4a5080; transform: translateY(-1px); }
  .card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  .card .value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .card .meta { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .card .trend { font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 3px; }
  .trend.up { color: var(--green); }
  .trend.down-good { color: var(--green); }
  .trend.down-bad { color: var(--red); }
  .trend.stable { color: var(--text-dim); }

  /* RAG indicator */
  .rag {
    position: absolute; top: 14px; right: 16px;
    width: 10px; height: 10px; border-radius: 50%;
  }
  .rag.Green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .rag.Yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .rag.Red { background: var(--red); box-shadow: 0 0 6px var(--red); }

  /* Sparkline */
  .sparkline { margin-top: 10px; }
  .sparkline svg { width: 100%; height: 32px; }
  .sparkline path { fill: none; stroke-width: 1.5; stroke-linecap: round; }
  .sparkline .area { stroke: none; opacity: .15; }

  /* Drill-down modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 32px;
    max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto;

  }
  .modal .detail-row:last-child { border-bottom: none; }
  .modal .detail-label { color: var(--text-dim); }
  .modal .close-btn {
    position: absolute; top: 16px; right: 20px; background: none;
    border: none; color: var(--text-dim); cursor: pointer; font-size: 20px;
  }

  .pipeline-table {

  }
  .pipeline-table th {
    text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
    color: var(--text-dim); font-weight: 500; font-size: 12px; text-transform: uppercase;

  .pipeline-table td {

  /* Alerts panel */
  .alerts-panel {

    border-radius: 12px; padding: 20px 24px; margin-bottom: 24px;

  .progress-bar.Green { background: var(--green); }
  .progress-bar.Yellow { background: var(--yellow); }
  .progress-bar.Red { background: var(--red); }

  .funnel { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .funnel-stage {

  .funnel-stage .stage-value { font-size: 12px; color: var(--text-dim); }

    .main { padding: 16px; }
    .grid { grid-template-columns: 1fr 1fr; }

  }
</style>

// ── Helpers ───────────────────────────────────────────────
const fmt = {
  USD: v => '$' + (v >= 1e6 ? (v/1e6).toFixed(1) + 'M' : v >= 1e3 ? (v/1e3).toFixed(0) + 'K' : v.toLocaleString()),
  '%': v => v + '%',

  ratio: v => v.toFixed(2),

  days: v => v + ' days',
  'rel/mo': v => v.toFixed(1) + '/mo',
};

function fmtVal(v, unit) { return (fmt[unit] || (x => x.toString()))(v); }

function pctChange(cur, prev) {
  if (!prev) return 0;
  return ((cur - prev) / Math.abs(prev) * 100);
}

function trendArrow(trend, name) {
  const lowerIsBetter = ['Support Ticket Volume','Avg Resolution Time','Escalation Rate','Avg Implementation Time','Implementation Backlog'].includes(name);
  if (trend === 'Stable') return '<span class="trend stable">→ Stable</span>';
  const pct = Math.abs(pctChange(
    kpiData.find(d=>d.name===name)?.current,
    kpiData.find(d=>d.name===name)?.prior
  )).toFixed(1);
  if (trend === 'Up') {
    const cls = lowerIsBetter ? 'down-bad' : 'up';
    return `<span class="trend ${cls}">↑ ${pct}%</span>`;
  }
  const cls = lowerIsBetter ? 'down-good' : 'down-bad';
  return `<span class="trend ${cls}">↓ ${pct}%</span>`;
}

// Generate fake sparkline data from prior → current over 6 points
function sparkPoints(prior, current) {
  const pts = [];
  const diff = current - prior;
  for (let i = 0; i < 6; i++) {
    const base = prior + diff * (i / 5);
    const noise = diff * 0.08 * (Math.sin(i * 2.5) + Math.cos(i * 1.3));
    pts.push(base + noise);
  }
  return pts;
}

function sparklineSVG(pts, color) {
  const min = Math.min(...pts), max = Math.max(...pts);
  const range = max - min || 1;
  const w = 120, h = 32, pad = 2;
  const coords = pts.map((v, i) => {
    const x = pad + (i / (pts.length - 1)) * (w - 2 * pad);
    const y = h - pad - ((v - min) / range) * (h - 2 * pad);
    return [x, y];
  });
  const lineD = coords.map((c, i) => (i === 0 ? 'M' : 'L') + c[0].toFixed(1) + ',' + c[1].toFixed(1)).join(' ');
  const areaD = lineD + ` L${coords[coords.length-1][0].toFixed(1)},${h} L${coords[0][0].toFixed(1)},${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path class="area" d="${areaD}" fill="${color}"/>
    <path d="${lineD}" stroke="${color}"/>
  </svg>`;
}

  'Satisfaction': { tab: 'product', title: 'Product & Adoption — Customer Satisfaction', order: 5 },
  'Pipeline': { tab: 'pipeline', title: 'Pipeline & Growth', order: 6 },
  'Integration': { tab: 'integration', title: 'Ripple Integration', order: 7 },
  'Operations': { tab: 'operations', title: 'Operational Health', order: 8 },
};

// ── Render ────────────────────────────────────────────────
function renderSections(filter) {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  // Show/hide alerts
  document.getElementById('alertsPanel').classList.toggle('visible', filter === 'alerts');
  if (filter === 'alerts') return;

  const groups = {};
  kpiData.forEach(d => {
    const key = d.cat;
    if (!groups[key]) groups[key] = [];
    groups[key].push(d);
  });

  const ordered = Object.entries(groups).sort((a, b) => (sectionMap[a[0]]?.order || 99) - (sectionMap[b[0]]?.order || 99));

  ordered.forEach(([cat, items]) => {
    const info = sectionMap[cat];
    if (filter !== 'all' && info?.tab !== filter) return;

    const section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = `<div class="section-title"><span class="dot"></span>${info?.title || cat}</div>`;

    // Special: integration progress bars
    if (cat === 'Integration') {
      const integrationItems = items.filter(d => d.unit === '%');
      const otherItems = items.filter(d => d.unit !== '%');
      const grid = document.createElement('div');
      grid.className = 'grid';

      integrationItems.forEach(d => {
        const card = makeIntegrationCard(d);
        grid.appendChild(card);
      });
      otherItems.forEach(d => {
        grid.appendChild(makeCard(d));
      });
      section.appendChild(grid);
    } else {
      const grid = document.createElement('div');
      grid.className = 'grid';
      items.forEach(d => grid.appendChild(makeCard(d)));
      section.appendChild(grid);
    }

    container.appendChild(section);
  });

  // Pipeline section: add funnel + deal table
  if (filter === 'all' || filter === 'pipeline') {
    renderPipelineDetails(container);
  }
}

function makeCard(d) {
  const card = document.createElement('div');
  card.className = 'card';
  const color = statusColor(d.status);
  const pts = sparkPoints(d.prior, d.current);

  card.innerHTML = `
    <div class="rag ${d.status}"></div>
    <div class="label">${d.name}</div>
    <div class="value" style="color:${color}">${fmtVal(d.current, d.unit)}</div>
    <div class="meta">
      ${trendArrow(d.trend, d.name)}
      <span>vs ${fmtVal(d.prior, d.unit)} prior Q</span>
    </div>
    <div class="meta" style="margin-top:2px;">
      <span>Target: ${fmtVal(d.target, d.unit)}</span>
    </div>
    <div class="sparkline">${sparklineSVG(pts, color)}</div>
  `;

  card.addEventListener('click', () => openDrillDown(d));
  return card;
}

function makeIntegrationCard(d) {
  const card = document.createElement('div');
  card.className = 'card';
  const color = statusColor(d.status);

  card.innerHTML = `
    <div class="rag ${d.status}"></div>
    <div class="label">${d.name}</div>
    <div class="value" style="color:${color}">${d.current}%</div>
    <div class="meta">
      ${trendArrow(d.trend, d.name)}
      <span>Target: ${d.target}%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar ${d.status}" style="width:${d.current}%"></div>
    </div>
    ${d.notes ? `<div class="meta" style="margin-top:8px;font-style:italic;">${d.notes}</div>` : ''}
  `;

  card.addEventListener('click', () => openDrillDown(d));
  return card;
}

function renderPipelineDetails(container) {
  const section = document.createElement('div');
  section.className = 'section';

  // Funnel
  const stages = ['Discovery','Technical Evaluation','Proposal Sent','Negotiation'];
  const funnelHtml = stages.map(s => {
    const stageDeals = deals.filter(d => d.stage === s);
    const total = stageDeals.reduce((a, d) => a + d.amount, 0);
    return `<div class="funnel-stage">
      <div class="stage-name">${s}</div>
      <div class="stage-count">${stageDeals.length}</div>
      <div class="stage-value">${fmt.USD(total)}</div>
    </div>`;
  }).join('');

  // Top deals table
  const topDeals = [...deals].filter(d => d.amount > 0).sort((a, b) => b.amount - a.amount).slice(0, 7);
  const stageClass = s => s === 'Negotiation' ? 'negotiation' : s === 'Technical Evaluation' ? 'technical' : s === 'Proposal Sent' ? 'proposal' : 'discovery';

  section.innerHTML = `
    <div class="section-title"><span class="dot"></span>Pipeline Funnel</div>
    <div class="funnel">${funnelHtml}</div>
    <div class="section-title" style="margin-top:20px;"><span class="dot"></span>Top Opportunities</div>
    <div style="overflow-x:auto;">
      <table class="pipeline-table">
        <thead><tr>
          <th>Account</th><th>Stage</th><th>Amount</th><th>Prob</th><th>Close</th><th>Next Step</th>
        </tr></thead>
        <tbody>
          ${topDeals.map(d => `<tr>
            <td><strong>${d.account}</strong><br><span style="color:var(--text-dim);font-size:11px;">${d.segment} · ${d.manager}</span></td>
            <td><span class="stage-badge ${stageClass(d.stage)}">${d.stage}</span></td>
            <td>${fmt.USD(d.amount)}</td>
            <td>${d.prob}%</td>
            <td>${d.close}</td>
            <td style="max-width:220px;font-size:12px;color:var(--text-dim);">${d.next}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
  container.appendChild(section);
}

// ── Drill-Down Modal ─────────────────────────────────────
function openDrillDown(d) {
  const modal = document.getElementById('modalContent');
  const change = pctChange(d.current, d.prior);
  const vsTarget = pctChange(d.current, d.target);

  modal.innerHTML = `
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3>${d.name}</h3>
    <div class="detail-row"><span class="detail-label">Category</span><span>${d.cat}</span></div>
    <div class="detail-row"><span class="detail-label">Current Value</span><span style="font-weight:600;">${fmtVal(d.current, d.unit)}</span></div>
    <div class="detail-row"><span class="detail-label">Prior Quarter</span><span>${fmtVal(d.prior, d.unit)}</span></div>
    <div class="detail-row"><span class="detail-label">QoQ Change</span><span>${change >= 0 ? '+' : ''}${change.toFixed(1)}%</span></div>
    <div class="detail-row"><span class="detail-label">Target</span><span>${fmtVal(d.target, d.unit)}</span></div>
    <div class="detail-row"><span class="detail-label">vs Target</span><span style="color:${d.status === 'Green' ? 'var(--green)' : d.status === 'Yellow' ? 'var(--yellow)' : 'var(--red)'}">${vsTarget >= 0 ? '+' : ''}${vsTarget.toFixed(1)}%</span></div>
    <div class="detail-row"><span class="detail-label">Status</span><span><span class="rag ${d.status}" style="display:inline-block;vertical-align:middle;margin-right:6px;"></span>${d.status}</span></div>
    ${d.notes ? `<div class="detail-row" style="flex-direction:column;gap:4px;"><span class="detail-label">Notes</span><span>${d.notes}</span></div>` : ''}
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Alerts ───────────────────────────────────────────────
function renderAlerts() {
  const panel = document.getElementById('alertsPanel');
  const alerts = kpiData.filter(d => d.status === 'Yellow' || d.status === 'Red');
  if (alerts.length === 0) {
    panel.innerHTML = '<div style="color:var(--text-dim);font-size:13px;">No alerts — all metrics within target.</div>';
    return;
  }
  panel.innerHTML = `<div class="section-title"><span class="dot" style="background:var(--yellow)"></span>Metrics Needing Attention (${alerts.length})</div>` +
    alerts.map(d => `
      <div class="alert-item">
        <span class="alert-dot ${d.status}"></span>
        <div style="flex:1;">
          <strong>${d.name}</strong> <span style="color:var(--text-dim);">(${d.cat})</span><br>
          <span style="font-size:12px;color:var(--text-dim);">Current: ${fmtVal(d.current, d.unit)} · Target: ${fmtVal(d.target, d.unit)}${d.notes ? ' — ' + d.notes : ''}</span>
        </div>
      </div>
    `).join('');
}

// ── Executive Summary ────────────────────────────────────
function renderExecSummary() {
  const arr = kpiData.find(d => d.name === 'Annual Recurring Revenue');
  const nrr = kpiData.find(d => d.name === 'Net Revenue Retention');
  const pipe = kpiData.find(d => d.name === 'Weighted Pipeline Value');
  const custs = kpiData.find(d => d.name === 'Total Active Customers');
  const custody = kpiData.find(d => d.name === 'Ripple Custody Integration');
  const yellows = kpiData.filter(d => d.status === 'Yellow').length;
  const reds = kpiData.filter(d => d.status === 'Red').length;

  const arrGrowth = pctChange(arr.current, arr.prior).toFixed(1);
  const pipeGrowth = pctChange(pipe.current, pipe.prior).toFixed(0);

  let summary = `<strong>ARR is at ${fmt.USD(arr.current)}</strong>, up ${arrGrowth}% QoQ and ahead of the ${fmt.USD(arr.target)} target — driven by enterprise upsells and strong net retention at ${nrr.current}%. `;
  summary += `The weighted pipeline stands at <strong>${fmt.USD(pipe.current)}</strong> (${pipeGrowth}% above prior quarter), with ${custs.current} active customers and 11 new logos this quarter. `;
  summary += `Ripple Custody integration is at ${custody.current}% completion (on track for April beta). `;

  if (yellows > 0) {
    summary += `<span style="color:var(--yellow);">${yellows} metric${yellows > 1 ? 's' : ''} flagged yellow</span> — primarily in risk module adoption, RLUSD integration timeline, and implementation backlog.`;
  }

  document.getElementById('execSummary').innerHTML = summary;

  // Update health badge
  if (reds > 0) {
    document.getElementById('healthBadge').textContent = `${reds} Red`;
    document.getElementById('healthBadge').className = 'badge warn';
  } else if (yellows > 0) {
    document.getElementById('healthBadge').textContent = `${yellows} Watch`;
    document.getElementById('healthBadge').className = 'badge warn';
  }
}

// ── Tabs ─────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderSections(tab.dataset.section);
  });
});

// ── Init ─────────────────────────────────────────────────
renderExecSummary();
renderAlerts();
renderSections('all');
</script>
</body>
</html>
